<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a5f7a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="manifest" href="https://progressier.app/koQqbxmcT3fLpo4IbM8P/progressier.json"/>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <title>BookReader</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://progressier.app/koQqbxmcT3fLpo4IbM8P/script.js"></script>
</head>
<body>
    <div class="main-wrapper">
        <!-- Top Ad Banner -->
        <div class="ad-banner" id="ad-top">
            <div class="ad-content">📢 Sponsor Advertisement</div>
        </div>

        <div class="container">
            <!-- Header -->
            <header class="header">
                <div class="header-content">
                    <h1>BookReader</h1>
                    <div class="header-controls">
                        <select id="book-select" class="book-select">
                            <option value="alice">Alice in Wonderland</option>
                            <option value="sherlock">Sherlock Holmes</option>
                            <option value="pride">Pride and Prejudice</option>
                        </select>
                        <label class="file-input-label">
                            <input type="file" id="file-input" accept=".txt,.pdf" style="display: none;">
                            📁 Open File
                        </label>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <!-- Reading Area -->
                <div class="reading-container">
                    <div class="book-content" id="book-content"></div>
                </div>

                <!-- Side Ad -->
                <aside class="side-ad" id="ad-side">
                    <div class="ad-content">Ads</div>
                </aside>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="prev-btn" class="btn btn-prev">← Previous</button>
                <div class="progress-info">
                    <span id="page-count">Page 1 of 10</span>
                    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                </div>
                <button id="next-btn" class="btn btn-next">Next →</button>
            </div>

            <!-- Settings -->
            <div class="settings">
                <div class="setting-group">
                    <label>Font Size</label>
                    <input type="range" id="font-size" min="12" max="24" value="16">
                    <span id="font-size-value">16</span>
                </div>
                <div class="setting-group">
                    <label>Line Height</label>
                    <input type="range" id="line-height" min="1.2" max="2" step="0.1" value="1.5">
                    <span id="line-height-value">1.5</span>
                </div>
                <label class="dark-mode-toggle">
                    <input type="checkbox" id="dark-mode">
                    <span>Dark Mode</span>
                </label>
            </div>
        </div>

        <!-- Bottom Ad Banner -->
        <div class="ad-banner" id="ad-bottom">
            <div class="ad-content">📢 Sponsor Advertisement</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
